<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager | Upeksha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { margin-top: 50px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 15px 15px 0 0; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header-bg">
            <h2 class="text-center">🚀 My Inventory Manager</h2>
            <p class="text-center mb-0">First Web Project for Portfolio</p>
        </div>
        <div class="card-body p-4">
            <table class="table table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>Item Name</th>
                        <th>Price (LKR)</th>
                        <th>Quantity</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Laptop</td>
                        <td>150,000</td>
                        <td>05</td>
                        <td><span class="badge bg-success">In Stock</span></td>
                    </tr>
                    <tr>
                        <td>Mouse</td>
                        <td>1,200</td>
                        <td>12</td>
                        <td><span class="badge bg-success">In Stock</span></td>
                        
                    </tr>
                    <tr>
                        <td>Key board</td>
                        <td>1,000</td>
                        <td>15</td>
                        <td><span class="badge bg-success">In Stock</span></td>
                    </tr>
                    <tr>
                        <td>Computer</td>
                        <td> 160,000</td>
                        <td>18</td>
                        <td><span class="badge bg-success">In Stock</span></td>
                    </tr>
                    <tr>
                        <td>i Phone</td>
                        <td> 211,000</td>
                        <td>10</td>
                        <td><span class="badge bg-success">In Stock</span></td>
                    </tr>
                    <tr>
                        <td>redmi 15c</td>
                        <td> 34,000</td>
                        <td>20</td>
                        <td><span class="badge bg-success">In Stock</span></td>
                    </tr>
                    <tr>
                        <td>Note pad</td>
                        <td> 57,000</td>
                        <td>12</td>
                        <td><span class="badge bg-success">In Stock</span></td>
                    </tr>
                    
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
