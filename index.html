<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise | Personal Finance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .header-section { background: #2c3e50; color: white; padding: 40px 0; margin-bottom: 30px; border-radius: 0 0 20px 20px; }
        .balance-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .income { color: #27ae60; font-weight: bold; }
        .expense { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-section text-center">
    <h1>💰 SpendWise</h1>
    <p>Smart Way to Track Your Expenses</p>
</div>

<div class="container">
    <div class="row text-center mb-4">
        <div class="col-md-4">
            <div class="balance-card">
                <h6>Current Balance</h6>
                <h2 id="totalBalance">LKR 0.00</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="balance-card">
                <h6>Total Income</h6>
                <h2 class="income" id="totalIncome">LKR 0.00</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="balance-card">
                <h6>Total Expense</h6>
                <h2 class="expense" id="totalExpense">LKR 0.00</h2>
            </div>
        </div>
    </div>

    <div class="card p-4 shadow-sm mb-4">
        <h4>Add Transaction</h4>
        <div class="row g-3">
            <div class="col-md-4">
                <input type="text" id="desc" class="form-control" placeholder="Description (e.g. Salary, Food)">
            </div>
            <div class="col-md-3">
                <input type="number" id="amount" class="form-control" placeholder="Amount (LKR)">
            </div>
            <div class="col-md-3">
                <select id="type" class="form-select">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="addTransaction()">Add</button>
            </div>
        </div>
    </div>

    <div class="card p-4 shadow-sm">
        <h4>Recent Transactions</h4>
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Type</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="transactionList">
                </tbody>
        </table>
    </div>
</div>

<script>
    let transactions = [];

    function addTransaction() {
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;

        if(desc === "" || isNaN(amount)) return alert("Please fill all fields!");

        const transaction = { desc, amount, type };
        transactions.push(transaction);
        updateUI();
        
        // Form එක clear කරනවා
        document.getElementById('desc').value = "";
        document.getElementById('amount').value = "";
    }

    function updateUI() {
        const list = document.getElementById('transactionList');
        let income = 0;
        let expense = 0;

        list.innerHTML = "";
        
        transactions.forEach(t => {
            if(t.type === 'income') income += t.amount;
            else expense += t.amount;

            list.innerHTML += `
                <tr>
                    <td>${t.desc}</td>
                    <td><span class="badge ${t.type === 'income' ? 'bg-success' : 'bg-danger'}">${t.type.toUpperCase()}</span></td>
                    <td class="${t.type === 'income' ? 'income' : 'expense'}">LKR ${t.amount.toLocaleString()}</td>
                </tr>
            `;
        });

        document.getElementById('totalIncome').innerText = `LKR ${income.toLocaleString()}`;
        document.getElementById('totalExpense').innerText = `LKR ${expense.toLocaleString()}`;
        document.getElementById('totalBalance').innerText = `LKR ${(income - expense).toLocaleString()}`;
    }
</script>

</body>
</html>
